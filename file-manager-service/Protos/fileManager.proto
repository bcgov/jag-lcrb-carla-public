syntax = "proto3";

import "google/protobuf/timestamp.proto";

option csharp_namespace = "Gov.Lclb.Cllb.Services.FileManager";

package filemanager;

// The files service definition.
service FileManager {

  // Create Folder.  Note that this will only send the create folder command if the folder does not exist.
  rpc CreateFolder (CreateFolderRequest) returns (CreateFolderReply);

  // Delete file
  rpc DeleteFile (DeleteFileRequest) returns (DeleteFileReply);

  // Download File
  rpc DownloadFile (DownloadFileRequest) returns (DownloadFileReply);

  // File Exists
  rpc FileExists (FileExistsRequest) returns (FileExistsReply);

  // Upload File
  rpc UploadFile (UploadFileRequest) returns (UploadFileReply);

  // Get files in a given folder.
  rpc FolderFiles (FolderFilesRequest) returns (FolderFilesReply);

  // Get a token given a secret.
  rpc GetToken (TokenRequest) returns (TokenReply);

  // Get the truncated filename (due to SharePoint limitations).
  rpc GetTruncatedFilename (TruncatedFilenameRequest) returns (TruncatedFilenameReply);

  // Ensure folder path exists, creating nested folders if needed and returning the server-relative folder path.
  rpc EnsureFolderPath (EnsureFolderPathRequest) returns (EnsureFolderPathReply);

  // Find a folder in an entity's document library by partial name match (e.g., searching by GUID).
  rpc FindFolder (FindFolderRequest) returns (FindFolderReply);

}

message CreateFolderRequest {
    string entityName = 1;
    string folderName = 2;
}

// collection of files
message CreateFolderReply {
    ResultStatus resultStatus = 1;
    string errorDetail = 2;
}

enum ResultStatus {
    Fail = 0;
    Success = 1;
}

enum FileExistStatus {
    Error = 0;
    NotExist = 1;
    Exist = 2;
}


message DeleteFileRequest {
    string serverRelativeUrl = 1;
}

message DeleteFileReply {
    ResultStatus resultStatus = 1;
    string errorDetail = 2;
}

message DownloadFileRequest {
    string serverRelativeUrl = 1;
}

message DownloadFileReply {
    bytes data = 1;
    ResultStatus resultStatus = 2;
    string errorDetail = 3;
}

message FileExistsRequest {
    string entityName = 1;
    string entityId = 2;
    string documentType = 3;
    string folderName = 4;
    string serverRelativeUrl = 5;
}

message FileExistsReply {
    FileExistStatus resultStatus = 1;
    string errorDetail = 2;
}

// Individual File
message FileSystemItem {
  string id = 1;
  string name = 2;
  string documentType = 3;
  int64 size = 4;
  string serverRelativeUrl = 5;
  google.protobuf.Timestamp timeCreated = 6;
  google.protobuf.Timestamp timeLastModified = 7;
}

message FolderFilesRequest {
    string entityId = 1;
    string entityName = 2;
    string documentType = 3;
    string folderName = 4;
}

// collection of files
message FolderFilesReply {
    repeated FileSystemItem files = 1;
    ResultStatus resultStatus = 2;
    string errorDetail = 3;
}

message TokenRequest {
    string secret = 1;
}

message TokenReply {
    ResultStatus resultStatus = 1;
    string token = 2;
    string errorDetail = 3;
}

message UploadFileRequest {
    string entityName = 1;
    string folderName = 2;
    string fileName = 3;
    string contentType = 4;
    bytes data = 5;
}

message UploadFileReply {
    ResultStatus resultStatus = 1;
    string errorDetail = 2;
    string fileName = 3;
}

message TruncatedFilenameRequest {
    string entityName = 1;
    string folderName = 2;
    string fileName = 3;
}

message TruncatedFilenameReply {
    ResultStatus resultStatus = 1;
    string fileName = 2;
    string errorDetail = 3;
}

message FolderSegment {
    string folderNameSegment = 1;
    string folderGuidSegment = 2;
    string folderName = 3;
}

message EnsureFolderPathRequest {
    string entityName = 1;
    repeated FolderSegment folderPath = 2;
}

message EnsureFolderPathReply {
    ResultStatus resultStatus = 1;
    string serverRelativeUrl = 2;
    string errorDetail = 3;
}

message FindFolderRequest {
    string entityName = 1;
    string searchString = 2;  // Case-sensitive search
    string searchGuid = 3;    // GUID search (dashes removed, converted to uppercase)
}

message FolderInfo {
    string name = 1;
    string serverRelativeUrl = 2;
}

message FindFolderReply {
    ResultStatus resultStatus = 1;
    repeated FolderInfo folders = 2;
    string errorDetail = 3;
}
